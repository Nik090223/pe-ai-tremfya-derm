apiVersion: v1
kind: ServiceAccount
metadata:
  name: pe-ai-qc
  namespace: pe-ai-tremfya-derm
---
# Minimal RBAC: the dashboard only needs to read its own pod metadata
# (for diagnostics). It never calls the K8s API to mutate anything.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pe-ai-qc-reader
  namespace: pe-ai-tremfya-derm
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pe-ai-qc-reader
  namespace: pe-ai-tremfya-derm
subjects:
  - kind: ServiceAccount
    name: pe-ai-qc
    namespace: pe-ai-tremfya-derm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pe-ai-qc-reader
